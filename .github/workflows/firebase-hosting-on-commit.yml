name: Deploy to Firebase Hosting preview on commit
on:
  push:
    branches: [master]

jobs:
  build_and_preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_VV_LAZYRASP_HOST }}
          projectId: vv-lazyrasp-host
          expires: 7d
